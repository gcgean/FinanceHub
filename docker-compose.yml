services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: financehub_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: financehub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: financehub_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/financehub
      JWT_SECRET: dev_financehub_secret_123
      NODE_ENV: development
      PORT: "3000"
      HOST: 0.0.0.0
    depends_on:
      - postgres

volumes:
  postgres_data: